<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>셀-프 리듬게임 ver.5.9</title>
<style>
:root{
  --bg:#050712;
  --panel:rgba(12,18,34,.78);
  --line:rgba(255,255,255,.14);
  --white:#fff;
  --red:#ff3454;
  --orange:#ff8a22;
  --yellow:#ffd733;
  --green:#2ee66b;
  --blue:#3aa7ff;
  --purple:#b35cff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:white;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button,input,select{font:inherit}
button{cursor:pointer;border:0;color:white}
.bg{
  position:fixed;inset:0;
  background:
    radial-gradient(circle at 20% 10%,rgba(58,167,255,.18),transparent 35%),
    radial-gradient(circle at 85% 20%,rgba(179,92,255,.18),transparent 34%),
    radial-gradient(circle at 50% 120%,rgba(255,52,84,.14),transparent 45%),
    linear-gradient(180deg,#090d1b,#03050c);
}
.bg:after{
  content:"";position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);
  background-size:42px 42px;
  mask-image:linear-gradient(to bottom,transparent,black 15%,black 80%,transparent);
}
.app{position:relative;z-index:2;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.version{position:fixed;right:18px;top:14px;color:rgba(255,255,255,.68);font-size:13px;letter-spacing:.08em;z-index:20}
.credit{position:fixed;left:0;right:0;bottom:10px;text-align:center;color:rgba(255,255,255,.52);font-size:12px;letter-spacing:.08em;z-index:20}
.screen{position:absolute;inset:0;display:none}
.screen.active{display:block}
.home{display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
.title{font-family:Georgia,"Times New Roman",serif;font-size:clamp(42px,8vw,92px);font-weight:900;letter-spacing:-.05em;margin:0 0 18px;text-shadow:0 18px 50px rgba(58,167,255,.22)}
.subtitle{color:rgba(255,255,255,.65);margin-bottom:32px}
.primary{
  padding:16px 38px;border-radius:999px;
  background:linear-gradient(135deg,#2d7dff,#9d4dff);
  box-shadow:0 18px 50px rgba(81,120,255,.32);
  font-weight:800;font-size:18px;
}
.menu{position:absolute;left:28px;top:105px;display:flex;flex-direction:column;gap:14px;transform:translateX(-150%);transition:.55s cubic-bezier(.2,1.1,.2,1)}
.menu.show{transform:translateX(0)}
.menu button,.ghost{
  min-width:150px;padding:14px 18px;border-radius:18px;background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(14px);font-weight:800
}
.smallTitle{position:absolute;left:26px;top:22px;font-family:Georgia,"Times New Roman",serif;font-size:28px;font-weight:900;opacity:0;transition:.35s}
.smallTitle.show{opacity:1}
.creator,.list,.settings{
  position:absolute;left:50%;top:88px;transform:translate(-50%,-130%);
  width:min(560px,92vw);padding:24px;border-radius:28px;background:rgba(10,16,32,.88);
  border:1px solid rgba(255,255,255,.14);box-shadow:0 30px 80px rgba(0,0,0,.45);
  backdrop-filter:blur(18px);transition:.55s cubic-bezier(.2,1.1,.2,1);opacity:0;pointer-events:none;
}
.creator.show,.list.show,.settings.show{transform:translate(-50%,0);opacity:1;pointer-events:auto}
.field{display:flex;flex-direction:column;gap:8px;margin:14px 0;text-align:left;color:rgba(255,255,255,.75);font-weight:700}
.field input,.field select{width:100%;padding:14px;border-radius:14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);color:white}
.row{display:flex;gap:10px;flex-wrap:wrap}
.difficulty button,.speed button,.mode button{
  flex:1;min-width:70px;padding:12px;border-radius:14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16)
}
.difficulty button.on,.speed button.on,.mode button.on{background:#2d7dff}
.exit{position:fixed;right:18px;bottom:24px;background:#ef334d;padding:13px 20px;border-radius:16px;font-weight:900;z-index:30;display:none}
.exit.show{display:block}
.toast{position:fixed;left:50%;bottom:64px;transform:translateX(-50%);background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.15);padding:12px 18px;border-radius:999px;opacity:0;transition:.25s;z-index:50}
.toast.show{opacity:1}
.game{padding:18px clamp(10px,2vw,24px) 28px;display:grid;grid-template-columns:minmax(150px,260px) minmax(320px,1fr) minmax(170px,260px);gap:18px;height:100%}
.topProgress{
  position:absolute;left:50%;top:18px;transform:translateX(-50%);
  width:min(760px,58vw);height:14px;border-radius:999px;background:rgba(255,255,255,.12);overflow:visible;border:1px solid rgba(255,255,255,.16)
}
.progressFill{height:100%;width:0%;border-radius:999px;background:linear-gradient(90deg,#fff,#62cfff);box-shadow:0 0 18px rgba(98,207,255,.5);transition:width .12s linear}
.topProgress.fire .progressFill{
  background:linear-gradient(90deg,#ff2c2c,#ff8a00,#ffe33b,#ff4d00);
  box-shadow:0 0 16px #ff6b00,0 0 34px rgba(255,30,0,.75);
  animation:barPulse .28s infinite alternate;
}
.topProgress.fire:after{
  content:"";position:absolute;left:0;bottom:8px;width:var(--fireWidth,0%);height:24px;
  background:linear-gradient(to top,rgba(255,57,0,.95),rgba(255,174,0,.8),transparent 72%);
  filter:blur(4px);border-radius:999px;animation:flame .18s infinite alternate;pointer-events:none;
}
@keyframes flame{from{transform:translateY(3px) scaleY(.85)}to{transform:translateY(-3px) scaleY(1.15)}}
@keyframes barPulse{to{filter:brightness(1.55)}}
.leftPanel,.rightPanel{
  align-self:center;min-height:420px;padding:20px;border-radius:28px;background:var(--panel);border:1px solid var(--line);backdrop-filter:blur(16px)
}
.leftPanel{margin-top:30px}
.songTitle{font-size:20px;font-weight:900;margin-bottom:8px}
.meta{color:rgba(255,255,255,.65);font-size:13px;line-height:1.8}
.score{font-size:30px;font-weight:950;margin:22px 0 8px}
.accuracy{font-size:14px;color:rgba(255,255,255,.65)}
.stage{
  align-self:end;position:relative;height:calc(100vh - 90px);min-height:520px;display:flex;justify-content:center;align-items:flex-end;perspective:720px;
}
.laneWrap{
  position:relative;width:min(720px,96%);height:100%;
  clip-path:polygon(26% 0,74% 0,100% 100%,0 100%);
  background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.095));
  border-bottom:2px solid rgba(255,255,255,.35);
  overflow:hidden;
  box-shadow:0 0 70px rgba(58,167,255,.13) inset,0 30px 80px rgba(0,0,0,.35);
}
.laneWrap:before{display:none;
  content:"";position:absolute;inset:0;
  background:linear-gradient(to right,transparent 16%,rgba(255,255,255,.13) 16.2%,transparent 16.5%,transparent 33%,rgba(255,255,255,.13) 33.2%,transparent 33.5%,transparent 50%,rgba(255,255,255,.13) 50.2%,transparent 50.5%,transparent 66.5%,rgba(255,255,255,.13) 66.7%,transparent 67%,transparent 83%,rgba(255,255,255,.13) 83.2%,transparent 83.5%),
             linear-gradient(to bottom,rgba(255,255,255,.18),transparent 2px);
  background-size:100% 100%,100% 58px;
  opacity:.75;
}
.hitLine{position:absolute;left:4%;right:4%;bottom:86px;height:5px;border-radius:999px;background:#fff;box-shadow:0 0 20px white,0 0 45px rgba(58,167,255,.8);z-index:8}
.note{
  position:absolute;height:22px;border-radius:10px;transform:translate(-50%,-50%);
  box-shadow:0 0 18px currentColor;
  z-index:5;
}
.note:after{content:"";position:absolute;left:10%;right:10%;top:50%;height:6px;transform:translateY(-50%);border-radius:999px;background:rgba(255,255,255,.9)}
.inputRow{
  position:absolute;left:4%;right:4%;bottom:18px;height:54px;display:flex;gap:10px;z-index:12;
}
.keyBtn{touch-action:manipulation;user-select:none;
  flex:1;clip-path:polygon(10% 0,90% 0,100% 100%,0 100%);
  border-radius:14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.22);
  display:flex;align-items:center;justify-content:center;font-weight:1000;font-size:18px;
  box-shadow:0 0 20px color-mix(in srgb,currentColor 50%,transparent);
}
.keyBtn.active{transform:scale(.96);filter:brightness(1.45)}
.rightPanel{margin-top:30px;text-align:center}
.comboNum{font-size:clamp(54px,6vw,94px);font-weight:1000;line-height:.9;letter-spacing:.03em;color:white;text-shadow:0 0 20px rgba(255,255,255,.28)}
.comboLabel{font-size:18px;font-weight:950;letter-spacing:.22em;color:rgba(255,255,255,.72);margin-top:6px}
.comboNum.pop{animation:comboPop .16s cubic-bezier(.15,1.45,.36,1)}
@keyframes comboPop{0%{transform:scale(1.36)}100%{transform:scale(1)}}
.combo-mid{color:#65d7ff;text-shadow:0 0 18px rgba(101,215,255,.9)}
.combo-high{color:#ffd74a;text-shadow:0 0 18px rgba(255,215,74,.9),0 0 38px rgba(255,170,0,.6);animation:sparkle .55s infinite alternate}
.combo-rainbow{
  background:linear-gradient(90deg,#ff3454,#ff8a22,#ffd733,#2ee66b,#3aa7ff,#b35cff,#ff3454);
  background-size:300% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:none;filter:drop-shadow(0 0 14px rgba(255,255,255,.75));animation:rainbow 1.1s linear infinite,flash .22s infinite alternate;
}
@keyframes rainbow{to{background-position:300% 0}}
@keyframes flash{to{filter:drop-shadow(0 0 25px white) brightness(1.8)}}
@keyframes sparkle{to{filter:brightness(1.35)}}
.judgement{font-size:28px;font-weight:1000;margin:26px 0 16px;min-height:36px}
.stats{display:grid;grid-template-columns:1fr auto;gap:8px 18px;text-align:left;font-size:14px;color:rgba(255,255,255,.78);margin-top:14px}
.stats b{text-align:right;color:white}
.countdown{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-size:120px;font-weight:1000;text-shadow:0 0 40px rgba(255,255,255,.7);z-index:100}
.result{
  position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.62);backdrop-filter:blur(10px);z-index:150
}
.resultBox{width:min(520px,92vw);padding:28px;border-radius:28px;background:rgba(12,18,34,.94);border:1px solid rgba(255,255,255,.16);text-align:center}
.resultScore{font-size:54px;font-weight:1000}

.laneWrap.osuMode{
  clip-path:none;
  border-radius:30px;
  background:
    radial-gradient(circle at 25% 20%,rgba(58,167,255,.12),transparent 28%),
    radial-gradient(circle at 75% 75%,rgba(179,92,255,.12),transparent 30%),
    rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.16);
}
.laneWrap.osuMode .hitLine,.laneWrap.osuMode .inputRow,.laneWrap.osuMode .laneGuideSvg{display:none !important}
.osuHint{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);color:rgba(255,255,255,.68);font-size:13px;font-weight:900;letter-spacing:.04em;z-index:20;pointer-events:none;text-align:center}
.osuTrailSvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:4;overflow:visible}
.osuTrailLine{stroke:rgba(255,255,255,.32);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none;filter:drop-shadow(0 0 8px rgba(58,167,255,.42))}
.osuCursor{position:absolute;width:28px;height:28px;border-radius:999px;border:2px solid rgba(255,255,255,.85);box-shadow:0 0 16px rgba(255,255,255,.65),0 0 28px rgba(58,167,255,.55);transform:translate(-50%,-50%);z-index:35;pointer-events:none;opacity:0;transition:opacity .12s}
.laneWrap.osuMode:hover .osuCursor{opacity:1}
.note.osuNote{width:78px !important;height:78px !important;border-radius:999px !important;background:currentColor !important;box-shadow:0 0 18px currentColor,0 0 42px rgba(255,255,255,.25) !important;border:4px solid rgba(255,255,255,.86) !important;display:flex;align-items:center;justify-content:center;font-size:23px;font-weight:1000;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5);overflow:visible !important}
.note.osuNote.next{filter:brightness(1.42) saturate(1.22);box-shadow:0 0 24px currentColor,0 0 72px rgba(255,255,255,.55) !important}
.note.osuNote.preview{filter:saturate(.9) brightness(.88);opacity:.52}
.note.osuNote .osuOrder{position:relative;z-index:4;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.72)}
.note.osuNote .osuApproach{position:absolute;left:50%;top:50%;width:100%;height:100%;border-radius:999px;border:4px solid rgba(255,255,255,.72);background:rgba(255,255,255,.055);transform:translate(-50%,-50%) scale(2.6);pointer-events:none;z-index:1;box-shadow:0 0 16px rgba(255,255,255,.32)}
.note.osuNote:after{left:50% !important;right:auto !important;top:50% !important;width:46% !important;height:46% !important;transform:translate(-50%,-50%) !important;border-radius:999px !important;background:rgba(255,255,255,.22) !important;border:1px solid rgba(255,255,255,.58);z-index:2}
@media(max-width:850px){.note.osuNote{width:70px !important;height:70px !important;font-size:20px}.note.osuNote .osuApproach{border-width:3px}.osuHint{bottom:18px;font-size:12px}.osuCursor{display:none}}

.laneWrap.taikoMode{
  clip-path:none;
  border-radius:28px;
  background:
    radial-gradient(circle at 16% 50%,rgba(255,255,255,.13),transparent 16%),
    linear-gradient(180deg,rgba(20,23,38,.90),rgba(10,13,24,.96));
  border:1px solid rgba(255,255,255,.16);
  overflow:hidden;
}
.laneWrap.taikoMode .laneGuideSvg,.laneWrap.taikoMode .hitLine{display:none !important}
.laneWrap.taikoMode:before{
  display:block;content:"";position:absolute;left:12%;right:4%;top:44%;height:12%;
  border-radius:999px;
  background:linear-gradient(90deg,rgba(255,255,255,.18),rgba(255,255,255,.07));
  border-top:2px solid rgba(255,255,255,.18);
  border-bottom:2px solid rgba(0,0,0,.18);
  opacity:.9;pointer-events:none;
}
.taikoHitZone{
  position:absolute;left:14.5%;top:50%;width:92px;height:92px;transform:translate(-50%,-50%);
  border-radius:999px;background:radial-gradient(circle,#fff 0 18%,#ffecbc 19% 48%,#b24b2c 49% 68%,#53251e 69% 100%);
  border:5px solid rgba(255,255,255,.92);box-shadow:0 0 24px rgba(255,255,255,.45),0 0 52px rgba(255,70,40,.28);z-index:10;pointer-events:none;
}
.taikoHitZone:before{content:"";position:absolute;inset:-17px;border-radius:999px;border:3px solid rgba(255,255,255,.32)}
.taikoHitZone:after{content:"판정";position:absolute;left:50%;top:110%;transform:translateX(-50%);font-size:12px;font-weight:1000;color:rgba(255,255,255,.72);letter-spacing:.08em}
.taikoHitZone.hitDon{animation:taikoDonPulse .16s ease-out}
.taikoHitZone.hitKa{animation:taikoKaPulse .16s ease-out}
@keyframes taikoDonPulse{0%{filter:brightness(1);transform:translate(-50%,-50%) scale(1)}50%{filter:brightness(1.8);transform:translate(-50%,-50%) scale(1.12)}100%{filter:brightness(1);transform:translate(-50%,-50%) scale(1)}}
@keyframes taikoKaPulse{0%{box-shadow:0 0 24px rgba(255,255,255,.45),0 0 52px rgba(88,215,255,.28);transform:translate(-50%,-50%) scale(1)}55%{box-shadow:0 0 30px rgba(255,255,255,.8),0 0 72px rgba(88,215,255,.75);transform:translate(-50%,-50%) scale(1.12)}100%{transform:translate(-50%,-50%) scale(1)}}
.taikoFlowLine{position:absolute;left:14.5%;right:6%;top:50%;height:2px;transform:translateY(-50%);background:linear-gradient(90deg,rgba(255,255,255,.65),rgba(255,255,255,.12));z-index:4;pointer-events:none}
.taikoHint{position:absolute;left:50%;bottom:94px;transform:translateX(-50%);z-index:20;color:rgba(255,255,255,.72);font-size:13px;font-weight:900;letter-spacing:.04em;pointer-events:none;text-align:center}
.note.taikoNote{
  width:54px !important;height:54px !important;
  border-radius:999px !important;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:1000;color:white;
  text-shadow:0 2px 8px rgba(0,0,0,.72);
  border:4px solid rgba(255,255,255,.86) !important;
  box-shadow:0 0 18px currentColor,0 0 34px rgba(255,255,255,.20) !important;
  overflow:hidden;
}
.note.taikoNote.nextTaiko{filter:brightness(1.25) saturate(1.18);box-shadow:0 0 22px currentColor,0 0 54px rgba(255,255,255,.34) !important}
.note.taikoNote:after{display:none !important}
.taikoDon{background:radial-gradient(circle at 35% 30%,#ff8a9a,#ff3454 58%,#a80c26) !important;color:#ff3454 !important}
.taikoKa{background:radial-gradient(circle at 35% 30%,#b8f2ff,#58d7ff 58%,#077da4) !important;color:#58d7ff !important}
.taikoText{position:relative;z-index:3;color:white;letter-spacing:.04em}
.inputRow.taikoInput{height:74px;gap:12px}
.inputRow.taikoInput .keyBtn{font-size:22px;clip-path:none;border-radius:22px;min-height:74px}
.inputRow.taikoInput .keyBtn:first-child{background:rgba(255,52,84,.18);border-color:rgba(255,52,84,.38)}
.inputRow.taikoInput .keyBtn:last-child{background:rgba(88,215,255,.16);border-color:rgba(88,215,255,.38)}
@media(max-width:850px){
  .taikoHint{bottom:122px;font-size:12px}
  .taikoHitZone{width:76px;height:76px;left:17%}
  .taikoFlowLine{left:17%;right:5%}
  .inputRow.taikoInput{height:104px}
  .inputRow.taikoInput .keyBtn{min-height:104px;font-size:24px}
  .note.taikoNote{width:48px !important;height:48px !important;font-size:15px}
}

@media(max-width:850px){
  .game{grid-template-columns:1fr;padding:56px 8px 22px}
  .leftPanel,.rightPanel{display:none}
  .stage{height:calc(100vh - 86px);min-height:0}
  .topProgress{width:88vw;top:18px}
  .laneWrap{width:100%;clip-path:polygon(18% 0,82% 0,100% 100%,0 100%)}
  .menu{left:18px;top:92px}
}

.creator .progressOuter{height:12px;background:rgba(255,255,255,.10);border-radius:999px;overflow:hidden;margin:12px 0 6px}
.creator .progressInner{height:100%;width:0%;background:linear-gradient(90deg,#3aa7ff,#b35cff);transition:width .25s}
.creator .analyzeStatus{min-height:40px;color:rgba(255,255,255,.62);font-size:13px;line-height:1.45;margin-top:8px}



.laneGuideSvg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:3;
}
.laneGuideLine{
  stroke:rgba(255,255,255,.22);
  stroke-width:2;
  stroke-linecap:round;
  filter:drop-shadow(0 0 6px rgba(255,255,255,.22));
}
.note{
  height:18px !important;
  border:4px solid currentColor !important;
  background:rgba(255,255,255,.98) !important;
  box-shadow:
    0 0 12px rgba(255,255,255,.95),
    0 0 24px currentColor,
    0 0 54px currentColor !important;
}
.note:after{
  height:7px !important;
  left:6% !important;
  right:6% !important;
  background:#ffffff !important;
  box-shadow:0 0 16px #ffffff,0 0 26px rgba(255,255,255,.92) !important;
}
.hitBurst{
  position:absolute;
  width:56px;
  height:56px;
  border-radius:999px;
  transform:translate(-50%,-50%) scale(.25);
  border:3px solid rgba(255,255,255,.95);
  background:radial-gradient(circle,rgba(255,255,255,.9),rgba(255,255,255,.25) 38%,transparent 68%);
  box-shadow:0 0 24px rgba(255,255,255,.9),0 0 42px currentColor;
  pointer-events:none;
  z-index:30;
  animation:hitBurstPop .28s ease-out forwards;
}
@keyframes hitBurstPop{
  0%{opacity:1;transform:translate(-50%,-50%) scale(.28)}
  70%{opacity:.72;transform:translate(-50%,-50%) scale(1.08)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.35)}
}


.laneGuideLine{
  stroke:rgba(255,255,255,.18) !important;
  stroke-width:2 !important;
  stroke-linecap:round;
  filter:none !important;
}
.note{
  height:18px !important;
  border:4px solid currentColor !important;
  background:#f7f7f7 !important;
  box-shadow:none !important;
}
.note:after{
  height:7px !important;
  left:7% !important;
  right:7% !important;
  background:#ffffff !important;
  box-shadow:none !important;
}
.hitSlice{
  position:absolute;
  height:12px;
  border-radius:999px;
  transform:translate(-50%,-50%) scaleX(.45);
  background:rgba(255,255,255,.95);
  border:2px solid currentColor;
  opacity:.95;
  pointer-events:none;
  z-index:30;
  animation:hitSlicePop .22s ease-out forwards;
}
@keyframes hitSlicePop{
  0%{opacity:1;transform:translate(-50%,-50%) scaleX(.45) scaleY(1)}
  55%{opacity:.9;transform:translate(-50%,-50%) scaleX(1.35) scaleY(.92)}
  100%{opacity:0;transform:translate(-50%,-50%) scaleX(1.75) scaleY(.65)}
}


.laneGuideLine{
  stroke:rgba(255,255,255,.28) !important;
  stroke-width:.65 !important;
  filter:drop-shadow(0 0 3px rgba(255,255,255,.45)) !important;
}
.note{
  height:24px !important;
  border:0 !important;
  background:currentColor !important;
  box-shadow:none !important;
  overflow:hidden;
}
.note:before{

<script>

const keys6 = ['S','D','F','H','J','K'];
const keysTaiko = ['D','F','J','K'];

const STORAGE_KEY = 'sionRhythmGamesV53';
const SETTINGS_KEY = 'sionRhythmSettingsV53';
const DB_NAME = 'sionRhythmAudioDB_v53';
const DB_STORE = 'audioFiles';

let games = JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');
let selectedMode = '4key';
let selectedDifficulty = 3;

let audioCtx = null;

const state = {
  running:false,startTime:0,notes:[],laneCount:4,keys:keys4,colors:colors4,mode:'4key',

};

}

function toast(msg){$('toast').textContent=msg;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1700)}

  ['creator','list','settings'].forEach(id=>$(id).classList.remove('show'));

}
function saveGames(){localStorage.setItem(STORAGE_KEY,JSON.stringify(games));}

function uid(){return 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2,8)}
function clamp(v,min,max){return Math.max(min,Math.min(max,v))}
function fmt(n,len=3){return String(n).padStart(len,'0')}
function round(v,d){const m=10**d;return Math.round(v*m)/m}
function waitFrame(){return new Promise(r=>requestAnimationFrame(r))}
function comboMult(combo){
  if(combo>=200) return 1.20;
  if(combo>=120) return 1.12;
  if(combo>=50) return 1.05;
  return 1.00;
}
function calcTotalWeight(total){
  let sum=0;
  for(let i=1;i<=total;i++) sum += comboMult(i);
  return sum || 1;
}
function judgementRatio(j){
  return {perfect:1,good:.97,ok:.90,fast:.60,miss:0}[j]||0;
}

/* IndexedDB: 이전 버전처럼 큰 오디오 저장 */
function openAudioDB(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME,1);
    req.onupgradeneeded = () => {
      const db=req.result;
      if(!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error('IndexedDB open failed'));
  });
}
async function saveAudioBlob(id,file){
  const db=await openAudioDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(DB_STORE,'readwrite');
    tx.objectStore(DB_STORE).put(file,id);
    tx.oncomplete=()=>resolve();
    tx.onerror=()=>reject(tx.error || new Error('IndexedDB save failed'));
  });
}
async function loadAudioBlob(id){
  const db=await openAudioDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction(DB_STORE,'readonly');
    const req=tx.objectStore(DB_STORE).get(id);
    req.onsuccess=()=>resolve(req.result || null);
    req.onerror=()=>reject(req.error || new Error('IndexedDB load failed'));
  });
}
async function deleteAudioBlob(id){
  try{
    const db=await openAudioDB();
    return new Promise(resolve=>{
      const tx=db.transaction(DB_STORE,'readwrite');
      tx.objectStore(DB_STORE).delete(id);
      tx.oncomplete=()=>resolve();
      tx.onerror=()=>resolve();
    });
  }catch(e){}
}
async function decodeAudioFile(file){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const buf = await file.arrayBuffer();
  return await audioCtx.decodeAudioData(buf.slice(0));
}

/* 이전 버전 기반 음악 분석 엔진 */
function getLaneCountByMode(mode){if(mode === '6key') return 6; if(mode === 'taiko') return 2; return 4;}
function getModeLabel(mode){if(mode === '6key') return '6KEY'; if(mode === 'osu') return "OSU'st"; if(mode === 'taiko') return 'TAIKO'; return '4KEY';}
function getDifficultyConfig(level){
  const table = {
    1:{densityMin:1.55,densityMax:2.15,minGap:.22,sameLaneGap:.22,kickGap:.28,snareGap:.30,melodyGap:.30,hatGap:.24,kickPct:72,snarePct:72,melodyPct:70,hatPct:76,kickQ:.25,snareQ:.24,melodyQ:.36,hatQ:.15},
    2:{densityMin:2.25,densityMax:3.00,minGap:.155,sameLaneGap:.18,kickGap:.21,snareGap:.22,melodyGap:.22,hatGap:.16,kickPct:66,snarePct:65,melodyPct:60,hatPct:66,kickQ:.21,snareQ:.21,melodyQ:.40,hatQ:.18},
    3:{densityMin:3.20,densityMax:4.25,minGap:.105,sameLaneGap:.135,kickGap:.15,snareGap:.17,melodyGap:.13,hatGap:.11,kickPct:66,snarePct:62,melodyPct:34,hatPct:64,kickQ:.12,snareQ:.16,melodyQ:.58,hatQ:.14},
    4:{densityMin:4.35,densityMax:5.65,minGap:.075,sameLaneGap:.105,kickGap:.12,snareGap:.13,melodyGap:.085,hatGap:.09,kickPct:60,snarePct:57,melodyPct:26,hatPct:55,kickQ:.10,snareQ:.15,melodyQ:.62,hatQ:.13},
    5:{densityMin:5.75,densityMax:7.10,minGap:.052,sameLaneGap:.085,kickGap:.09,snareGap:.10,melodyGap:.052,hatGap:.065,kickPct:54,snarePct:50,melodyPct:18,hatPct:48,kickQ:.08,snareQ:.12,melodyQ:.70,hatQ:.10}
  };
  return table[clamp(Number(level)||3,1,5)] || table[3];
}
function decorateOsuNotes(notes,difficulty){
  const points=[[20,22],[47,18],[75,25],[68,48],[38,42],[18,64],[50,72],[80,68],[30,30],[60,28],[72,56],[42,60],[22,46],[55,80],[84,38],[16,78]];
  const size = difficulty>=5 ? 58 : difficulty>=4 ? 62 : 66;
  return notes.map((n,i)=>{
    const base=points[i%points.length];
    const drift=Math.floor(i/points.length)%4;
    return {...n,lane:0,x:clamp(base[0]+(drift-1.5)*3,10,90),y:clamp(base[1]+((i%3)-1)*4,12,82),size,osu:true};
  });
}
function mixToMono(buffer){
  const len=buffer.length, chs=buffer.numberOfChannels;
  const out=new Float32Array(len);
  for(let c=0;c<chs;c++){
    const data=buffer.getChannelData(c);
    for(let i=0;i<len;i++) out[i]+=data[i]/chs;
  }
  return out;
}
function percentile(arr,p){
  const a=arr.filter(Number.isFinite).sort((x,y)=>x-y);
  if(!a.length) return 0;
  const idx=Math.floor((p/100)*(a.length-1));
  return a[idx];
}
function smoothField(frames,field,radius){
  const out=[];
  for(let i=0;i<frames.length;i++){
    let sum=0,c=0;
    for(let j=-radius;j<=radius;j++){
      const f=frames[i+j];
      if(f){sum+=f[field];c++}
    }
    out[i]=sum/c;
  }
  frames.forEach((f,i)=>f[field+'Sm']=out[i]);
}
function addFlux(frames,sourceField,outField,memory=.70){
  let prev=frames[0]?.[sourceField] || 0;
  for(const f of frames){
    const now=f[sourceField] || 0;
    f[outField]=Math.max(0, now-prev);
    prev = prev*memory + now*(1-memory);
  }
  smoothField(frames,outField,1);
  for(const f of frames) f[outField]=f[outField+'Sm'];
}
function detectPeaks(frames,field,threshold,minGap){
  const peaks=[]; let lastT=-999;
  for(let i=1;i<frames.length-1;i++){
    const a=frames[i-1][field]||0, b=frames[i][field]||0, c=frames[i+1][field]||0;
    const ok = b>threshold && b>a*1.03 && b>=c*.96;
    if(ok && frames[i].t-lastT>=minGap){
      peaks.push({t:frames[i].t,value:b,index:i});
      lastT=frames[i].t;
    }
  }
  return peaks;
}
function buildQuotas(duration,target,diff){
  return {
    kick:Math.floor(target*diff.kickQ),
    snare:Math.floor(target*diff.snareQ),
    melody:Math.floor(target*diff.melodyQ),
    hat:Math.floor(target*diff.hatQ)
  };
}
function chooseMelodyLane(i,laneCount){
  if(laneCount===6){
    const p=[0,1,2,3,4,5,1,3,2,4,0,5];
    return p[i%p.length];
  }
  const p=[0,1,3,2,0,3,1,2,0,1,3,2];
  return p[i%p.length];
}
function candidateToNote(c){
  return {time:c.t,lane:c.lane??0,type:c.type,power:c.weight||c.value||0};
}
function priority(type){return type==='kick'?4:type==='snare'?3:type==='melody'?2:type==='hat'?1:0}
function pickTopDistributed(candidates,count,minGap){
  const picked=[], sorted=[...candidates].sort((a,b)=>b.weight-a.weight);
  for(const c of sorted){
    if(picked.length>=count) break;
    if(!picked.some(p=>Math.abs(p.t-c.t)<minGap)) picked.push(c);
  }
  return picked.sort((a,b)=>a.t-b.t);
}
function mergeClassifiedNotes(candidates,minGap){
  const sorted=candidates.map(candidateToNote).sort((a,b)=>a.time-b.time || priority(b.type)-priority(a.type));
  const out=[];
  for(const n of sorted){
    const near=out.find(o=>Math.abs(o.time-n.time)<minGap);
    if(!near) out.push({...n});
    else{
      const ns=(n.power||0)*(1+priority(n.type)*.08);
      const os=(near.power||0)*(1+priority(near.type)*.08);
      if(ns>os) Object.assign(near,n);
    }
  }
  return out.sort((a,b)=>a.time-b.time);
}
function nearAny(notes,t,gap){return notes.some(n=>Math.abs(n.time-t)<gap)}
function refinePlayablePattern(notes,cfg){
  const sorted=[...notes].sort((a,b)=>a.time-b.time), out=[];
  for(const n of sorted){
    const last=out[out.length-1];
    if(!last || n.time-last.time>=cfg.minGap) out.push(n);
    else if((n.power||0)*(1+priority(n.type)*.08) > (last.power||0)*(1+priority(last.type)*.08)) out[out.length-1]=n;
  }
  return out;
}
function chooseLeastRecentLane(recent,type,i,laneCount){
  const all=Array.from({length:laneCount},(_,x)=>x);
  const preferred = type==='kick' ? (laneCount===6?[2,3,1,4,0,5]:[2,0,1,3]) :
                    type==='snare'? (laneCount===6?[1,4,3,0,5,2]:[1,3,0,2]) :
                    type==='hat' ? (laneCount===6?[5,4,3,2,1,0]:[3,1,2,0]) : all;
  let best=preferred[0], score=999;
  for(const lane of preferred){
    const idx=recent.lastIndexOf(lane);
    const s=idx===-1?-10:idx;
    if(s<score){score=s;best=lane}
  }
  return best;
}
function rebalanceRepeatedLanes(notes,cfg,laneCount){
  const sorted=[...notes].sort((a,b)=>a.time-b.time);
  let streak=0;
  for(let i=0;i<sorted.length;i++){
    const n=sorted[i], prev=sorted[i-1];
    streak = prev && prev.lane===n.lane ? streak+1 : 1;
    const tooClose = prev && prev.lane===n.lane && (n.time-prev.time)<cfg.sameLaneGap*2.2;
    if(tooClose || streak>=3){
      const recent=sorted.slice(Math.max(0,i-4),i).map(x=>x.lane);
      n.lane=chooseLeastRecentLane(recent,n.type,i,laneCount);
      streak=1;
    }
  }
  return sorted;
}
function analyzeMusic(buffer,difficulty,progress,mode='4key'){
  const laneCount=getLaneCountByMode(mode);
  const sampleRate=buffer.sampleRate;
  const raw=mixToMono(buffer);
  const frameSize=Math.round(sampleRate*.038);
  const hop=Math.round(sampleRate*.019);
  const frames=[];
  const duration=buffer.duration;
  const diff=getDifficultyConfig(difficulty);
  const targetMin=Math.max(24,Math.floor(duration*diff.densityMin));
  const targetMax=Math.max(targetMin+8,Math.floor(duration*diff.densityMax));
  const targetMid=Math.floor((targetMin+targetMax)/2);
  const cfg={minGap:diff.minGap,sameLaneGap:diff.sameLaneGap,kickGap:diff.kickGap,snareGap:diff.snareGap,melodyGap:diff.melodyGap,hatGap:diff.hatGap};

  progress?.(`${getModeLabel(mode)} · 난이도 ${difficulty}: 음악을 킥/스네어/멜로디/하이햇으로 분석 중...`,22);

  for(let start=0; start+frameSize<raw.length; start+=hop){
    const t=start/sampleRate;
    let total=0, zc=0, prev=raw[start];
    let sub=0,low=0,lowMid=0,mid=0,highMid=0,high=0;
    let lp1=0,lp2=0,lp3=0,lp4=0,last=raw[start];

    for(let i=0;i<frameSize;i++){
      const v=raw[start+i]; total+=v*v;
      if((prev<=0&&v>0)||(prev>=0&&v<0)) zc++;
      prev=v;
      lp1=lp1*.994+v*.006;
      lp2=lp2*.975+v*.025;
      lp3=lp3*.905+v*.095;
      lp4=lp4*.70+v*.30;
      const bSub=lp1, bLow=lp2-lp1, bLowMid=lp3-lp2, bMid=lp4-lp3, bHigh=v-lp4, diffV=v-last;
      last=v;
      sub+=bSub*bSub; low+=bLow*bLow; lowMid+=bLowMid*bLowMid; mid+=bMid*bMid; high+=bHigh*bHigh; highMid+=diffV*diffV;
    }

    const inv=1/frameSize;
    total*=inv; sub*=inv; low*=inv; lowMid*=inv; mid*=inv; highMid*=inv; high*=inv;
    const zcr=zc/frameSize, bass=sub+low, body=lowMid+mid, brightness=highMid+high;

    const kickScore=bass*clamp(bass/(body+brightness+1e-8),.3,2.8);
    const snareScore=(lowMid*.55+mid*.45+highMid*.80)*clamp(brightness/(bass+1e-8),.45,2.0)*clamp(1-Math.abs(zcr-.12)*2.0,.35,1.2);
    const melodyBoost=1+Math.max(0,difficulty-3)*.18;
    const melodyScore=(lowMid*1.05+mid*1.95*melodyBoost+highMid*.44*melodyBoost)*clamp(1-bass/(body+brightness+1e-8)*.035,.78,1.35);
    const hatScore=(high*1.25+highMid*.65)*clamp(zcr*8.0,.35,2.2)*clamp(1-bass/(brightness+body+1e-8)*.20,.35,1.1);

    frames.push({t,total,zcr,kickScore,snareScore,melodyScore,hatScore});
  }

  progress?.('피크 후보를 계산하는 중...',40);
  smoothField(frames,'kickScore',2); smoothField(frames,'snareScore',2); smoothField(frames,'melodyScore',3); smoothField(frames,'hatScore',1);
  addFlux(frames,'kickScoreSm','kickFlux',.68);
  addFlux(frames,'snareScoreSm','snareFlux',.66);
  addFlux(frames,'melodyScoreSm','melodyFlux',.70);
  addFlux(frames,'hatScoreSm','hatFlux',.58);

  const energyGate=percentile(frames.map(f=>f.total),42);
  const quota=buildQuotas(duration,targetMid,diff);

  const kickCandidates=detectPeaks(frames,'kickFlux',percentile(frames.map(f=>f.kickFlux),diff.kickPct),cfg.kickGap)
    .filter(p=>frames[p.index].total>energyGate*.6)
    .map(p=>({...p,lane:laneCount===6?2:2,type:'kick',weight:p.value*1.25}));
  const snareCandidates=detectPeaks(frames,'snareFlux',percentile(frames.map(f=>f.snareFlux),diff.snarePct),cfg.snareGap)
    .filter(p=>frames[p.index].total>energyGate*.55)
    .map(p=>({...p,lane:1,type:'snare',weight:p.value*1.10}));
  const melodyCandidates=detectPeaks(frames,'melodyFlux',percentile(frames.map(f=>f.melodyFlux),diff.melodyPct),cfg.melodyGap)
    .filter(p=>frames[p.index].total>energyGate*.48)
    .map((p,i)=>({...p,lane:chooseMelodyLane(i,laneCount),type:'melody',weight:p.value}));
  const hatCandidates=detectPeaks(frames,'hatFlux',percentile(frames.map(f=>f.hatFlux),diff.hatPct),cfg.hatGap)
    .filter(p=>frames[p.index].total>energyGate*.42)
    .map(p=>({...p,lane:laneCount===6?5:3,type:'hat',weight:p.value*.88}));

  progress?.(`후보: 킥 ${kickCandidates.length}, 스네어 ${snareCandidates.length}, 멜로디 ${melodyCandidates.length}, 하이햇 ${hatCandidates.length}`,68);

  let selected;
  if(mode === 'taiko'){
    const taikoTarget=Math.floor(targetMid*.92);
    selected=[
      ...pickTopDistributed(kickCandidates.map(c=>({...c,lane:0,type:'kick',weight:c.weight*1.18})),Math.floor(taikoTarget*.48),cfg.kickGap),
      ...pickTopDistributed(melodyCandidates.map(c=>({...c,lane:1,type:'melody',weight:c.weight*1.08})),Math.floor(taikoTarget*.52),cfg.melodyGap)
    ];
  }else{
    selected=[
      ...pickTopDistributed(kickCandidates,quota.kick,cfg.kickGap),
      ...pickTopDistributed(snareCandidates,quota.snare,cfg.snareGap),
      ...pickTopDistributed(melodyCandidates,quota.melody,cfg.melodyGap),
      ...pickTopDistributed(hatCandidates,quota.hat,cfg.hatGap)
    ];
  }

  let notes=mergeClassifiedNotes(selected,cfg.minGap);

  if(notes.length<targetMin){
    const all=[...kickCandidates,...snareCandidates,...melodyCandidates,...hatCandidates].sort((a,b)=>b.weight-a.weight);
    for(const c of all){
      if(notes.length>=targetMin) break;
      if(!nearAny(notes,c.t,cfg.minGap)){
        notes.push(candidateToNote(c));
        notes=notes.sort((a,b)=>a.time-b.time);
      }
    }
  }
  if(notes.length>targetMax){
    notes=notes.map(n=>({...n,keepScore:n.power*(n.type==='kick'?1.25:n.type==='snare'?1.1:n.type==='melody'?1.0:.82)}))
      .sort((a,b)=>b.keepScore-a.keepScore).slice(0,targetMax).sort((a,b)=>a.time-b.time);
  }
  notes=refinePlayablePattern(notes,cfg);
  notes=rebalanceRepeatedLanes(notes,cfg,laneCount);
  notes=notes.sort((a,b)=>a.time-b.time).map((n,i)=>({
    id:i,time:round(n.time,3),lane:n.lane,type:n.type,judged:false,el:null
  }));

  if(mode === 'taiko') notes = notes.map((n,i)=>({...n,id:i,lane:n.type==='kick'?0:1,taikoType:n.type==='kick'?'don':'ka'}));
  if(mode === 'osu') notes = decorateOsuNotes(notes,difficulty);
  progress?.(`분석 완료! 노트 ${notes.length}개 생성`,100);
  return {notes,laneCount,mode};
}

function escapeHtml(str){return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function createPractice(){
  if(games.some(g=>g.practice)) return;
  const duration=80, difficulty=3, mode='4key', made=makeFallbackNotes(duration,difficulty,mode);
  games.push({id:'practice',name:'연습 게임',mode,difficulty,duration,laneCount:4,noteCount:made.notes.length,notes:made.notes,practice:true,created:Date.now()});
  saveGames();
}
function makeFallbackNotes(duration,diff,mode='4key'){
  const laneCount = getLaneCountByMode(mode);
  const total = Math.max(60, Math.round(duration * (diff>=7?3.2:diff>=6?2.5:1.25+diff*.34)));
  const notes=[];
  for(let i=0;i<total;i++){
    const t = 1.4 + (duration-3.2)*(i/(total-1));
    let lane = mode==='taiko' ? (i%3===0?0:1) : (laneCount===6 ? i%6 : (i*2+Math.floor(i/3))%4);
    const type = mode==='taiko' ? (lane===0?'kick':'melody') : 'fallback';
    notes.push({id:i,time:t,lane,judged:false,el:null,type});
  }
  const finalNotes = mode === 'osu' ? decorateOsuNotes(notes,diff) : notes;
  return {notes:finalNotes,laneCount,mode};
}

    const lane=Math.floor(x*state.laneCount);
    if(lane>=0 && lane<state.laneCount){
      e.preventDefault();
      pressLane(lane,state.keys[lane]);
    }
  };
}

/* game start/play */
function isLandscapeNow(){return window.innerWidth > window.innerHeight;}
function showRotateOverlay(text){
  const o=$('rotateOverlay');
  if(!o) return;
  $('rotateText').textContent=text || '가로로 돌려주세요';
  o.classList.add('show');
}
function hideRotateOverlay(){const o=$('rotateOverlay'); if(o) o.classList.remove('show');}
async function tryLockOrientation(type){
  try{
    if(type === 'landscape' && document.documentElement.requestFullscreen && !document.fullscreenElement){
      await document.documentElement.requestFullscreen().catch(()=>{});
    }
    if(screen.orientation && screen.orientation.lock) await screen.orientation.lock(type);
  }catch(e){}
}
function waitForLandscapeThenStart(g){
  showRotateOverlay('가로로 돌려주세요');
  let started=false;
  const startWhenReady=()=>{
    if(started) return;
    if(!isLandscapeNow()){
      showRotateOverlay('가로로 돌려주세요');
      return;
    }
    started=true;
    window.removeEventListener('resize', startWhenReady);
    window.removeEventListener('orientationchange', startWhenReady);
    hideRotateOverlay();
    beginRun(g,true);
  };
  window.addEventListener('resize', startWhenReady);
  window.addEventListener('orientationchange', startWhenReady);
  const guard=setInterval(()=>{ if(started) clearInterval(guard); else startWhenReady(); },300);
  startWhenReady();
}

async function startGame(g){
  currentGame=g; showPanel(null); $('menu').classList.remove('show'); $('smallTitle').classList.remove('show'); setScreen('game'); $('exitBtn').classList.add('show');

  const notes=(g.notes||[]).map((n,i)=>({...n,id:i,judged:false,el:null}));
  Object.assign(state,{
    running:false,notes,laneCount:g.laneCount || getLaneCountByMode(g.mode || '4key'),
    mode:g.mode || ((g.laneCount||4)===6?'6key':'4key'),
    keys:(g.mode==='osu')?[]:(g.mode==='taiko'?keysTaiko:((g.laneCount||4)===6?keys6:keys4)),
    colors:g.mode==='taiko'?colorsTaiko:((g.laneCount||4)===6?colors6:colors4),
    score:0,combo:0,maxCombo:0,counts:{perfect:0,good:0,ok:0,fast:0,miss:0},judged:0
  });
  state.totalWeight=calcTotalWeight(state.notes.length);
  state.baseScore=1000000/state.totalWeight;
  $('songTitle').textContent=g.name;
  $('modeText').textContent=getModeLabel(state.mode);
  $('totalNotes').textContent=state.notes.length;
  if($('difficultyNow')) $('difficultyNow').textContent='Difficulty '+(g.difficulty || 3);
  $('notesLayer').innerHTML='';
  $('result').style.display='none';
  setupInput(); createGuides(); updateHUD();
  document.body.classList.toggle('taikoPlaying', state.mode === 'taiko');
  document.body.classList.toggle('taikoPlayingMobile', isMobile && state.mode === 'taiko');
  if(isMobile && state.mode === 'taiko'){
    tryLockOrientation('landscape');
    waitForLandscapeThenStart(g);
  }else{
    beginRun(g, true);
  }
}
function countdown(done){
  const c=$('countdown'); c.style.display='flex';
  let arr=['3','2','1','START']; let i=0;
  const tick=()=>{c.textContent=arr[i++]; if(i<=arr.length)setTimeout(tick,720); else{c.style.display='none';done();}};
  tick();
}
async function beginRun(g, withCountdown=false){
  const audio=$('audio');
  audio.volume=Number($('volume').value);
  if(audioUrl){URL.revokeObjectURL(audioUrl); audioUrl=null;}

  if(!g.practice){
    try{
      const blob=await loadAudioBlob(g.id);
      if(blob){
        audioUrl=URL.createObjectURL(blob);
        audio.src=audioUrl;
        audio.load();
      }
    }catch(e){toast('오디오를 불러오지 못했어');}
  }else{
    audio.removeAttribute('src');
  }

  // 카운트다운 321 동안 노트가 실제로 내려오도록, 화면 시간만 먼저 흐르게 한다.
  // START 시점에는 songTime=0 근처가 되도록 2.95초 프리롤.
  const preRoll = withCountdown ? 2.95 : 0;
  state.running=true;
  state.startTime=performance.now()/1000 + preRoll;
  loop();

  if(withCountdown){
    countdown(()=>{
      state.startTime=performance.now()/1000;
      if(!g.practice && audio.src) audio.play().catch(()=>{});
    });
  }else{
    if(!g.practice && audio.src) audio.play().catch(()=>{});
  }
}
function laneCenter(lane,p){
  const n=state.laneCount;
  if(state.mode === 'taiko') return lane===0 ? 30 : 70;
  const topLeft=.26, topRight=.74, botLeft=.04, botRight=.96;
  const left=topLeft+(botLeft-topLeft)*p;
  const right=topRight+(botRight-topRight)*p;
  return (left + (right-left)*((lane+.5)/n))*100;
}
function laneWidth(p){
  if(state.mode === 'taiko') return 32;
  const top=.48, bot=.92;
  return (top+(bot-top)*p)*100/state.laneCount;
}
function nextOsuNote(){
  return state.notes.find(n=>!n.judged) || null;
}
function getUpcomingOsuNotes(now, limit=5){
  const visibleAhead = Math.max(1.05, 2.2 / noteSpeed);
  const timed = state.notes.filter(n=>!n.judged && (n.time-now)<visibleAhead && (n.time-now)>-0.28);
  const guaranteed = state.notes.filter(n=>!n.judged).slice(0,3); // 현재/다음/다다음은 항상 노출
  const merged=[];
  [...guaranteed,...timed].sort((a,b)=>a.time-b.time).forEach(n=>{
    if(!merged.includes(n)) merged.push(n);
  });
  return merged.slice(0,limit);
}
function updateOsuTrail(now){
  if(state.mode !== 'osu') return;
  const line=$('osuTrailLine');
  if(!line) return;
  const upcoming=getUpcomingOsuNotes(now,6);
  line.setAttribute('points', upcoming.map(n=>(n.x||50)+','+(n.y||50)).join(' '));
}
function renderOsuNote(note,now){
  const appear = Math.max(.95, 1.95 / noteSpeed);
  const dt = note.time - now;
  const upcoming=getUpcomingOsuNotes(now,6);
  const rank=upcoming.indexOf(note);
  const forcePreview = rank >= 0 && rank < 3;
  if((dt>appear && !forcePreview) || dt<-0.28){ if(note.el) note.el.style.display='none'; return; }
  if(!note.el){
    note.el=document.createElement('div');
    note.el.className='note osuNote';
    note.el.style.color=state.colors[note.id % state.colors.length] || '#3aa7ff';
    const approach=document.createElement('span');
    approach.className='osuApproach';
    note.el.appendChild(approach);
    const label=document.createElement('span');
    label.className='osuOrder';
    note.el.appendChild(label);
    $('notesLayer').appendChild(note.el);
  }
  const p=clamp(1 - dt/appear,0,1);
  const size=(note.size||66) + p*18;
  const next=nextOsuNote();
  note.el.classList.toggle('next', next && next.id===note.id);
  note.el.classList.toggle('preview', forcePreview && dt>appear);
  const label=note.el.querySelector('.osuOrder');
  if(label) label.textContent=(note.id+1);
  const approach=note.el.querySelector('.osuApproach');
  if(approach){
    const scale = dt>appear ? 2.75 : 1 + clamp(dt/appear,0,1)*1.75;
    const opacity = dt>appear ? .20 : (.88 - p*.10);
    approach.style.transform=`translate(-50%,-50%) scale(${scale})`;
    approach.style.opacity=opacity;
  }
  note.el.style.display='flex';
  note.el.style.left=(note.x||50)+'%';
  note.el.style.top=(note.y||50)+'%';
  note.el.style.width=size+'px';
  note.el.style.height=size+'px';
  note.el.style.opacity=dt<-.18?.48:(forcePreview && dt>appear?.52:1);
}

function renderTaikoNote(note,now){
  const travel = Math.max(.95, 2.55 / noteSpeed);
  const dt = note.time - now;
  const p = 1 - (dt / travel);
  const hitX = isMobile ? 14 : 16;
  const startX = 104;
  const endX = -8;
  const x = startX + (hitX - startX) * p;
  if(p < -0.15 || x < endX || dt < -0.26){ if(note.el) note.el.style.display='none'; return; }
  if(!note.el){
    note.el=document.createElement('div');
    note.el.className='note taikoNote '+(note.lane===0?'taikoDon':'taikoKa');
    note.el.style.color=state.colors[note.lane];
    note.el.innerHTML='';
    $('notesLayer').appendChild(note.el);
  }
  note.el.style.display='flex';
  note.el.classList.toggle('nextTaiko', state.notes.find(n=>!n.judged) === note);
  const size = (isMobile ? 58 : 72) + Math.max(0, Math.min(1, p)) * 10;
  note.el.style.left=x+'%';
  note.el.style.top=(isMobile ? '30vh' : '42vh');
  note.el.style.width=size+'px';
  note.el.style.height=size+'px';
  note.el.style.opacity=p<0 ? .45 : 1;
}

function renderNote(note,now){
  if(state.mode === 'osu') return renderOsuNote(note,now);
  if(state.mode === 'taiko') return renderTaikoNote(note,now);
  const travel = Math.max(.9, 2.35 / noteSpeed);
  const hitY = 84;
  const p = 1 - ((note.time-now)/travel);
  if(p<-0.95 || p>1.2){ if(note.el) note.el.style.display='none'; return; }
  if(!note.el){
    note.el=document.createElement('div');
    note.el.className=state.mode==='taiko' ? 'note taikoNote '+(note.lane===0?'taikoDon':'taikoKa') : 'note';
    note.el.style.color=state.colors[note.lane];
    if(state.mode==='taiko') note.el.innerHTML='';
    $('notesLayer').appendChild(note.el);
  }
  note.el.style.display='block';
  const y=p*hitY;
  const w=state.mode==='taiko' ? laneWidth(clamp(p,0,1))*.72 : laneWidth(clamp(p,0,1))*.90;
  const h=state.mode==='taiko' ? 22 + p*18 : 7 + p*13;
  note.el.style.left=laneCenter(note.lane,clamp(p,0,1))+'%';
  note.el.style.top=y+'%';
  note.el.style.width=w+'%';
  note.el.style.height=h+'px';
  note.el.style.opacity=p<0?.25:1;
}
function loop(){
  if(!state.running)return;
  const now=performance.now()/1000-state.startTime;
  updateOsuTrail(now);
  updateOsuCursor();
  state.notes.forEach(n=>{
    if(adminMode && !n.judged && now >= n.time){
      applyJudgement(n,'perfect');
      return;
    }
    if(!n.judged && now-n.time>0.22) applyJudgement(n,'miss');
    if(!n.judged) renderNote(n,now);
  });
  const audio=$('audio');
  const endTime = (audio && audio.duration && isFinite(audio.duration)) ? audio.duration : (state.notes[state.notes.length-1]?.time || 0) + 2;
  const prog=Math.min(100, now/endTime*100);
  $('progressFill').style.width=prog+'%';
  const pf=$('progressFill');
  pf.classList.remove('combo-p0','combo-p50','combo-p120','combo-p160');
  if(state.combo>=160) pf.classList.add('combo-p160');
  else if(state.combo>=120) pf.classList.add('combo-p120');
  else if(state.combo>=50) pf.classList.add('combo-p50');
  else pf.classList.add('combo-p0');
  if($('progressPct')) $('progressPct').textContent=Math.floor(prog)+'%';
  $('topProgress').style.setProperty('--fireWidth',prog+'%');
  $('topProgress').classList.remove('fire');
  if(now>=endTime) return finish();
  state.raf=requestAnimationFrame(loop);
}
function updateOsuCursor(){
  if(state.mode !== 'osu') return;
  const cur=$('osuCursor');
  if(!cur || osuPointer.x==null || osuPointer.y==null) return;
  cur.style.left=osuPointer.x+'%';
  cur.style.top=osuPointer.y+'%';
  cur.style.opacity=osuPointer.inside?1:0;
}
function pressOsuAt(clientX,clientY){
  if(!state.running || state.mode !== 'osu') return;
  const wrap=$('laneWrap');
  const rect=wrap.getBoundingClientRect();
  const x=(clientX-rect.left)/rect.width*100;
  const y=(clientY-rect.top)/rect.height*100;
  const now=performance.now()/1000-state.startTime;
  const n=nextOsuNote();
  if(!n) return;
  const dx=(x-(n.x||50))*rect.width/100;
  const dy=(y-(n.y||50))*rect.height/100;
  const dist=Math.hypot(dx,dy);
  const dt=now-n.time;
  const limit=(n.size||64)*.95;
  if(!(dt>-0.24 && dt<0.22 && dist<=limit)) return;
  let j;
  if(dt < -0.135) j='fast';
  else if(Math.abs(dt)<=0.045) j='perfect';
  else if(Math.abs(dt)<=0.108) j='good';
  else if(Math.abs(dt)<=0.154) j='ok';
  else j='fast';
  applyJudgement(n,j);
}
function pressOsuWithPointer(){
  if(osuPointer.x==null || osuPointer.y==null) return;
  const wrap=$('laneWrap');
  const rect=wrap.getBoundingClientRect();
  pressOsuAt(rect.left + rect.width*osuPointer.x/100, rect.top + rect.height*osuPointer.y/100);
}
$('laneWrap').addEventListener('pointermove',e=>{
  if(state.mode !== 'osu') return;
  const rect=$('laneWrap').getBoundingClientRect();
  osuPointer.x=clamp((e.clientX-rect.left)/rect.width*100,0,100);
  osuPointer.y=clamp((e.clientY-rect.top)/rect.height*100,0,100);
  osuPointer.inside=true;
  updateOsuCursor();
});
$('laneWrap').addEventListener('pointerleave',()=>{osuPointer.inside=false;updateOsuCursor();});
$('laneWrap').addEventListener('pointerdown',e=>{
  if(state.mode === 'osu'){
    e.preventDefault();
    const rect=$('laneWrap').getBoundingClientRect();
    osuPointer.x=clamp((e.clientX-rect.left)/rect.width*100,0,100);
    osuPointer.y=clamp((e.clientY-rect.top)/rect.height*100,0,100);
    osuPointer.inside=true;
    pressOsuAt(e.clientX,e.clientY);
  }
});

function pressLane(lane,key){
  if(!state.running)return;
  const btn=[...document.querySelectorAll('.keyBtn')][lane];
  if(btn){btn.classList.add('active');setTimeout(()=>btn.classList.remove('active'),90)}
  const now=performance.now()/1000-state.startTime;
  const candidates=state.notes.filter(n=>!n.judged && n.lane===lane).map(n=>({n,dt:now-n.time})).filter(x=>x.dt>-0.24 && x.dt<0.20);
  if(!candidates.length) return;
  candidates.sort((a,b)=>Math.abs(a.dt)-Math.abs(b.dt));
  const {n,dt}=candidates[0];
  let j;
  if(dt < -0.135) j='fast';
  else if(Math.abs(dt)<=0.045) j='perfect';
  else if(Math.abs(dt)<=0.108) j='good';
  else if(Math.abs(dt)<=0.154) j='ok';
  else j='fast';
  applyJudgement(n,j);
}

function spawnHitBurst(note, judgement){
  if(judgement === 'fast' || judgement === 'miss') return;

  const wrap = document.getElementById('laneWrap');
  if(!wrap) return;

  const now = performance.now()/1000 - state.startTime;
  const dt = Math.abs(now - note.time);

  let lengthScale = 1;
  if(judgement === 'perfect') lengthScale = 1.0;
  else if(judgement === 'good') lengthScale = 0.62;
  else if(judgement === 'ok') lengthScale = 0.36;
  if(lengthScale <= 0.15) return;

  if(state.mode === 'taiko'){
    const hit=$('taikoHitZone');
    if(hit){
      hit.classList.remove('hitDon','hitKa');
      void hit.offsetWidth;
      hit.classList.add(note.lane===0?'hitDon':'hitKa');
    }
    const burst=document.createElement('div');
    burst.className='hitBurst';
    burst.style.color=state.colors[note.lane] || '#fff';
    burst.style.left=(isMobile ? 14 : 16)+'%';
    burst.style.top=(isMobile ? '30vh' : '42vh');
    wrap.appendChild(burst);
    setTimeout(()=>burst.remove(),320);
    return;
  }

  if(state.mode === 'osu'){
    const burst=document.createElement('div');
    burst.className='hitBurst';
    burst.style.color=state.colors[note.id % state.colors.length] || '#fff';
    burst.style.left=(note.x||50)+'%';
    burst.style.top=(note.y||50)+'%';
    wrap.appendChild(burst);
    setTimeout(()=>burst.remove(),320);
    return;
  }

  const fixedP = 1.0; // 인식선과 완전히 겹치게
  const slice = document.createElement('div');
  slice.className = 'hitSlice';
  slice.style.color = state.colors[note.lane] || '#ffffff';
  slice.style.left = laneCenter(note.lane, fixedP) + '%';
  slice.style.top = (fixedP * 84) + '%';
  slice.style.width = (laneWidth(fixedP) * 0.78 * lengthScale) + '%';
  slice.style.animationDuration = (0.18 + lengthScale * 0.08) + 's';
  wrap.appendChild(slice);
  setTimeout(()=>slice.remove(),280);
}


function showCenterJudge(j){
  const el = document.getElementById('centerJudge');
  if(!el) return;
  el.textContent = j.toUpperCase();
  el.className = 'centerJudge ' + j;
  void el.offsetWidth;
  el.classList.add('show');
}

function applyJudgement(note,j){
  if(note.judged)return;
  note.judged=true; state.judged++;
  if(note.el) note.el.remove();
  spawnHitBurst(note, j);
  state.counts[j]++;
  if(j==='fast' || j==='miss'){ state.combo=0; if(j==='miss'){ document.body.classList.add('shake'); setTimeout(()=>document.body.classList.remove('shake'),180);} }
  else { state.combo++; state.maxCombo=Math.max(state.maxCombo,state.combo); if(state.combo>0 && state.combo%20===0) spawnComboBackFlash(state.combo); }
  const mult=comboMult(Math.max(1,state.combo || 1));
  state.score += state.baseScore * mult * judgementRatio(j);
  $('judgeText').textContent=j.toUpperCase();
  showCenterJudge(j);
  updateHUD(true);
}

function spawnComboBackFlash(comboValue){
  const wrap = document.getElementById('laneWrap');
  if(!wrap) return;
  const flash = document.createElement('div');
  flash.className = 'comboBackFlash';
  flash.dataset.combo = String(comboValue);
  wrap.appendChild(flash);
  setTimeout(()=>flash.remove(),720);
}

function updateHUD(pop=false){
  const c=$('comboNum');
  c.textContent=fmt(state.combo);
  c.className='comboNum';
  if(state.combo>=25)c.classList.add('combo-glow25');
  if(state.combo>=200)c.classList.add('combo-rainbow');
  else if(state.combo>=150)c.classList.add('combo-fire150');
  else if(state.combo>=120)c.classList.add('combo-high');
  else if(state.combo>=50)c.classList.add('combo-mid');
  if(pop){c.classList.remove('pop'); void c.offsetWidth; c.classList.add('pop');}
  $('scoreText').textContent=Math.floor(state.score).toString().padStart(7,'0');
  const acc = state.judged ? ((state.counts.perfect + state.counts.good*.97 + state.counts.ok*.9 + state.counts.fast*.6)/state.judged*100) : 100;
  $('accuracyText').textContent='Accuracy '+acc.toFixed(2)+'%';
  $('cPerfect').textContent=state.counts.perfect;
  $('cGood').textContent=state.counts.good;
  $('cOk').textContent=state.counts.ok;
  $('cFast').textContent=state.counts.fast;
  $('cMiss').textContent=state.counts.miss;
  $('cMax').textContent=state.maxCombo;
}
function finish(){
  const wasMobileTaiko = isMobile && state.mode === 'taiko';
  state.running=false; cancelAnimationFrame(state.raf); $('audio').pause();
  if(state.mode === 'taiko' && !wasMobileTaiko) document.body.classList.remove('taikoPlaying');
  if(wasMobileTaiko){
    document.body.classList.remove('taikoPlaying','taikoPlayingMobile');
    tryLockOrientation('portrait');
  }
  const finalScore=Math.min(1000000,Math.round(state.score));
  $('resultScore').textContent=finalScore.toLocaleString();
  $('resultDetail').innerHTML=`MAX COMBO ${state.maxCombo} / ${state.notes.length}<br>PERFECT ${state.counts.perfect} · GOOD ${state.counts.good} · OK ${state.counts.ok} · FAST ${state.counts.fast} · MISS ${state.counts.miss}`;
  $('result').style.display='flex';
}
function resetToMenu(){
  state.running=false; cancelAnimationFrame(state.raf); $('audio').pause();
  document.body.classList.remove('taikoPlaying','taikoPlayingMobile'); hideRotateOverlay(); if(isMobile) tryLockOrientation('portrait');
  $('exitBtn').classList.remove('show'); setScreen('home'); $('smallTitle').classList.add('show'); $('menu').classList.add('show'); renderList();
}

/* buttons */
document.getElementById('adminEgg')?.addEventListener('click', toggleAdminMode);
$('startBtn').onclick=()=>{
  $('homeCenter').style.display='none';
  $('smallTitle').classList.add('show');
  $('menu').classList.add('show');
};
$('openCreator').onclick=()=>showPanel('creator');
$('openList').onclick=()=>{renderList();showPanel('list')};
$('openSettings').onclick=()=>showPanel('settings');
$('exitBtn').onclick=resetToMenu;
$('backMenu').onclick=resetToMenu;
$('makeGame').onclick=async()=>{
  const name=$('gameName').value.trim() || '새 게임';
  const file=$('mp3File').files[0];
  if(!file){toast('MP3 파일을 먼저 넣어줘.');return;}
  const okExt = /\.(mp3|m4a|wav|aac)$/i.test(file.name) || /^audio\//i.test(file.type || '');
  if(!okExt){toast('mp3, m4a, wav, aac 파일만 사용할 수 있어.');return;}
  try{
    $('makeGame').disabled=true;
    setStatus('MP3를 읽는 중...',8);
    await waitFrame();
    const audioBuffer=await decodeAudioFile(file);
    if(isMobile && selectedMode === '6key'){toast('모바일 6KEY는 화면이 좁을 수 있어. PC 플레이를 추천해.');}

    setStatus(`${getModeLabel(selectedMode)} · 난이도 ${selectedDifficulty} 분석 준비 중...`,16);
    await waitFrame();
    const made=analyzeMusic(audioBuffer,selectedDifficulty,setStatus,selectedMode);

    setStatus('오디오 저장 중... IndexedDB를 사용합니다.',88);
    const id=uid();
    await saveAudioBlob(id,file);

    const game={
      id,name,mode:selectedMode,difficulty:selectedDifficulty,created:Date.now(),
      duration:audioBuffer.duration,laneCount:made.laneCount,
      noteCount:made.notes.length,notes:made.notes
    };
    games.unshift(game); saveGames(); renderList();
    setStatus(`제작 완료! 노트 ${made.notes.length}개 생성됨`,100);
    toast('🔥 제작 완료! 🔥');
    setTimeout(()=>showPanel('list'),900);
  }catch(err){
    console.error(err);
    setStatus('제작 실패: '+(err.message||err),0);
    toast('제작 실패');
  }finally{
    $('makeGame').disabled=false;
  }
};
document.addEventListener('keydown',e=>{
  const k=e.key.toUpperCase();
  if(e.code === 'Space'){
    e.preventDefault();
    e.stopPropagation();
    if(state.mode === 'osu') pressOsuWithPointer();
    return;
  }
  if(state.mode === 'taiko'){
    if(k==='D' || k==='F') pressLane(0,k);
    else if(k==='J' || k==='K') pressLane(1,k);
  }else{
    const idx=state.keys.indexOf(k);
    if(idx>=0) pressLane(idx,k);
  }
  if(k==='ESCAPE') resetToMenu();
});

buildMode(); buildDiff(); buildSpeed(); createPractice(); renderList();

let lastTouchEnd = 0;
document.addEventListener('touchend', function (event) {
  const now = (new Date()).getTime();
  if (now - lastTouchEnd <= 300) {
    event.preventDefault();
  }
  lastTouchEnd = now;
}, false);

</script>
