<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HS ver0.2</title>

<style>
html,body{
margin:0;height:100%;overflow:hidden;background:#000;color:#fff;
font-family:sans-serif;
}
video,canvas{
position:absolute;width:100%;height:100%;object-fit:cover;
}
video{transform:scaleX(-1);opacity:.85;}
canvas{z-index:3;}

#ui{
position:absolute;right:50px;top:50%;
transform:translateY(-50%);
width:300px;height:300px;
border-radius:50%;
border:1px solid rgba(255,255,255,.2);
backdrop-filter:blur(10px);
}

.segment{
position:absolute;
width:100%;height:100%;
border-radius:50%;
pointer-events:none;
}

.center{
position:absolute;
left:50%;top:50%;
transform:translate(-50%,-50%);
width:90px;height:90px;
border-radius:50%;
background:rgba(255,255,255,.1);
display:flex;align-items:center;justify-content:center;
font-weight:900;
cursor:pointer;
border:1px solid rgba(255,255,255,.2);
}

#brand{
position:absolute;left:15px;top:15px;
background:rgba(0,0,0,.5);
padding:10px;border-radius:10px;
}
</style>
</head>

<body>

<div id="brand">
<b>HS ver0.2</b><br>
<small>made by. SIONINZION</small>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div id="ui">
<div class="center" id="toggle">OFF</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const toggle = document.getElementById('toggle');

let isOn = false;
let currentCode = "C";

const codes = ["A","B","C","D","E","F","G"];

toggle.onclick = ()=>{
isOn = !isOn;
toggle.innerText = isOn ? "ON" : "OFF";
if(!isOn) stopSound();
};

function resize(){
canvas.width = innerWidth;
canvas.height = innerHeight;
}
resize();
window.onresize = resize;

function sx(p){ return (1-p.x)*innerWidth }
function sy(p){ return p.y*innerHeight }

let audioCtx;
let osc, gain;

function startSound(freq){
if(!audioCtx){
audioCtx = new (window.AudioContext||window.webkitAudioContext)();
gain = audioCtx.createGain();
gain.connect(audioCtx.destination);
}

if(osc) osc.stop();

osc = audioCtx.createOscillator();
osc.type = "triangle";
osc.frequency.value = freq;
osc.connect(gain);
gain.gain.value = 0.15;
osc.start();
}

function stopSound(){
if(osc) osc.stop();
}

const freqMap = {
C:261.6,D:293.6,E:329.6,F:349.2,G:392,A:440,B:493
};

function detectZone(x,y){
const cx = innerWidth - 200;
const cy = innerHeight/2;

const dx = x - cx;
const dy = y - cy;

const angle = Math.atan2(dy,dx);
let deg = angle * 180/Math.PI;
if(deg<0) deg+=360;

const index = Math.floor(deg / (360/7));
return codes[index];
}

function onResults(res){
ctx.clearRect(0,0,canvas.width,canvas.height);

if(!res.multiHandLandmarks) return;

res.multiHandLandmarks.forEach((lm,i)=>{
const handed = res.multiHandedness[i].label;

// 👉 왼손만 사용
if(handed !== "Left") return;

const index = lm[8];
const x = sx(index);
const y = sy(index);

// 점 표시
ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(x,y,8,0,Math.PI*2);
ctx.fill();

// 검지 선
ctx.strokeStyle="cyan";
ctx.lineWidth=4;
ctx.beginPath();
[5,6,7,8].forEach((id,j)=>{
const p = lm[id];
j?ctx.lineTo(sx(p),sy(p)):ctx.moveTo(sx(p),sy(p));
});
ctx.stroke();

// 영역 판정
const code = detectZone(x,y);

if(code !== currentCode){
currentCode = code;
if(isOn) startSound(freqMap[code]);
}

});
}

async function start(){
const hands = new Hands({
locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
maxNumHands:2,
modelComplexity:1,
minDetectionConfidence:0.7,
minTrackingConfidence:0.7
});

hands.onResults(onResults);

const cam = new Camera(video,{
onFrame: async ()=> await hands.send({image:video}),
width:1280,
height:720
});

cam.start();
}

start();
</script>

</body>
</html>
